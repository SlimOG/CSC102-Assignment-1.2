<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Page title -->
    <title>Strings Assignment</title>

    <!-- Link to CSS file -->
    <link rel="stylesheet" href="main.css">

    <!-- Link to JavaScript file -->
    <script src="code.js" defer></script>
</head>

<!-- this section is for the new programming concepts assignment -->
<section id="skillsBox">
    <!-- this heading tells the user what the new feature does -->
    <h2>Student Skill Level Checker</h2>

    <!-- this paragraph explains the user input -->
    <p>Enter your name and the number of programming concepts you understand.</p>

    <!-- this form collects user input using submit -->
    <form id="skillsForm">
        <!-- this label identifies the student name input -->
        <label for="studentName">Student Name:</label>

        <!-- this input allows the user to type a name -->
        <input type="text" id="studentName">

        <!-- this line break separates the inputs -->
        <br><br>

        <!-- this label identifies the concepts input -->
        <label for="conceptCount">Concepts Understood 0-6:</label>

        <!-- this input allows the user to type a number -->
        <input type="text" id="conceptCount">

        <!-- this line break separates the button -->
        <br><br>

        <!-- this button submits the form -->
        <input type="submit" value="Check Skill Level">
    </form>

    <!-- this area displays validation and results using innerHTML -->
    <h3 id="skillsMessage">Your result will appear here.</h3>

    <!-- this area displays the concepts list created by a loop -->
    <div id="conceptList"></div>
</section>

<body>
    <!-- Main heading -->
    <h1>Welcome to My Strings Page</h1>

    <!-- Navigation menu -->
    <nav>
        <a href="index.html">Home</a><br>
        <a href="boards.html">Boards</a><br>
        <a href="game.html">Game</a><br>
        <a href="strings.html">Strings</a>
    </nav>

    <!-- Page image -->
    <p>
        <img id="memeimage" src="meme.JPG" alt="Meme image">
    </p>

    <!-- palindrome form section -->
<h2>Palindrome Checker</h2>

<!-- creative instruction text -->
<p>Enter a word or phrase to see if it reads the same forward and backward.</p>

<!-- palindrome form -->
<form id="palindromeForm">

    <!-- user input box -->
    <label for="palindromeInput">Enter word or phrase:</label>

    <!-- text box for palindrome -->
    <input type="text" id="palindromeInput" name="palindromeInput">

    <!-- submit button -->
    <input type="submit" value="Check Palindrome">

</form>

<!-- result message area -->
<h3 id="palindromeMessage"></h3>

<!-- history message area -->
<div id="palindromeHistory"></div>
    <!-- User input form -->
    <form id="myForm">
        <!-- First name input -->
        <label for="fname">First Name:</label>
        <input type="text" id="fname" name="fname"><br><br>

        <!-- Last name input -->
        <label for="lname">Last Name:</label>
        <input type="text" id="lname" name="lname"><br><br>

        <!-- Zip code input -->
        <label for="zipcode">Zip Code:</label>
        <input type="text" id="zipcode" name="zipcode"><br><br>

        <!-- Submit button -->
        <input type="submit" value="Submit">
    </form>

    <!-- Validation message area -->
    <h3 id="validationmessage"></h3>

</body>

</html>
