    <!-- Main heading -->

        <a href="boards.html">Boards</a><br>

    <!-- Page image -->

        <img id="memeimage" src="meme.JPG" alt="Meme image">
    </p>

    <!-- palindrome form section -->
<h2>Palindrome Checker</h2>

<!-- creative instruction text -->
<p>Enter a word or phrase to see if it reads the same forward and backward.</p>

<!-- palindrome form -->
<form id="palindromeForm">

    <!-- user input box -->
    <label for="palindromeInput">Enter word or phrase:</label>

    <!-- text box for palindrome -->
    <input type="text" id="palindromeInput" name="palindromeInput">

    <!-- submit button -->
    <input type="submit" value="Check Palindrome">

</form>

<!-- result message area -->
<h3 id="palindromeMessage"></h3>

<!-- history message area -->
<div id="palindromeHistory"></div>
    <!-- User input form -->
    <form id="myForm">
        <!-- First name input -->
        <label for="fname">First Name:</label>
        <input type="text" id="fname" name="fname"><br><br>

        <!-- Last name input -->
        <label for="lname">Last Name:</label>
        <input type="text" id="lname" name="lname"><br><br>

        <!-- Zip code input -->
        <label for="zipcode">Zip Code:</label>
        <input type="text" id="zipcode" name="zipcode"><br><br>

        <!-- Submit button -->
        <input type="submit" value="Submit">
    </form>

    <!-- Validation message area -->
    <h3 id="validationmessage"></h3>

</body>
